<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Image Tagger AI</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#eef3f9;color:#222}
header{background:linear-gradient(90deg,#0b5ed7,#4f8df5);color:#fff;padding:18px;text-align:center}
.container{max-width:1200px;margin:25px auto;padding:20px}
.card{background:#fff;border-radius:14px;box-shadow:0 8px 20px rgba(0,0,0,.08);padding:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
input[type=file]{margin-bottom:15px}
canvas{width:100%;border:2px dashed #bbb;border-radius:10px;background:#fafafa}
.section{margin-top:18px}
.badge{display:inline-block;background:#0b5ed7;color:#fff;padding:6px 12px;border-radius:20px;margin:4px;font-size:14px}
pre{background:#111;color:#0f0;padding:12px;border-radius:8px;overflow:auto;max-height:260px}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<h1>🤖 Smart Image Tagger AI</h1>
<p>Azure Vision + Face Detection + OCR + Brand Detection + Landmark Recognition</p>
</header>

<div class="container">
<div class="grid">
<div class="card">
<h2>Upload Image</h2>
<input type="file" id="file" accept="image/*">
<canvas id="canvas"></canvas>
</div>

<div class="card">
<h2>Analysis</h2>
<div class="section"><h3>Caption</h3><p id="caption">-</p></div>
<div class="section"><h3>Faces Detected</h3><p id="faceCount">0</p></div>
<div class="section"><h3>Tags</h3><div id="tags"></div></div>
<div class="section"><h3></h3><div id="brands"></div></div>
<div class="section"><h3>Landmark Recognition</h3><div id="landmarks"></div></div>
<div class="section"><h3>Brand Name</h3><div id="ocr"></div></div>
<div class="section"><h3>Debug JSON</h3><pre id="json"></pre></div>
</div>
</div>
</div>

<script>
const file=document.getElementById("file");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

file.onchange=()=>{
 const f=file.files[0];
 if(!f) return;
 const reader=new FileReader();
 reader.onload=()=>{
   const img=new Image();
   img.onload=async()=>{
     canvas.width=img.width;
     canvas.height=img.height;
     ctx.drawImage(img,0,0);

     const res=await fetch("/analyze",{
       method:"POST",
       headers:{"Content-Type":"application/json"},
       body:JSON.stringify({image_base64:reader.result})
     });

     const data=await res.json();

     document.getElementById("caption").textContent=data.caption||"No caption";
     document.getElementById("faceCount").textContent=(data.faces||[]).length;

     const tags=document.getElementById("tags");
     tags.innerHTML="";
     (data.tags||[]).forEach(tag=>{
       const s=document.createElement("span");
       s.className="badge";
       s.textContent=`${tag.name||""} ${Math.round((tag.confidence||0)*100)}%`;
       tags.appendChild(s);
     });

     const brands=document.getElementById("brands");
     brands.innerHTML="";
     (data.brands||[]).forEach(b=>{
       const s=document.createElement("span");
       s.className="badge";
       s.textContent=b.brand||b.name;
       brands.appendChild(s);
     });

     const landmarks=document.getElementById("landmarks");
     landmarks.innerHTML="";
     (data.landmarks||[]).forEach(l=>{
       const s=document.createElement("span");
       s.className="badge";
       s.textContent=l.confidence?`${l.name} ${Math.round(l.confidence*100)}%`:l.name;
       landmarks.appendChild(s);
     });

     const ocr=document.getElementById("ocr");
     ocr.innerHTML="";
     (data.ocr||[]).forEach(block=>{
       (block.lines||[]).forEach(line=>{
         const d=document.createElement("div");
         d.textContent=line.text;
         ocr.appendChild(d);
       });
     });

     document.getElementById("json").textContent=JSON.stringify(data,null,2);

     ctx.drawImage(img,0,0);
     ctx.strokeStyle="#00ff00";
     ctx.fillStyle="#00ff00";
     ctx.font="18px Arial";
     ctx.lineWidth=3;

     (data.faces||[]).forEach(face=>{
       const r=face.rectangle;
       if(r){
         ctx.strokeRect(r.left,r.top,r.width,r.height);
         ctx.fillText("Face",r.left,Math.max(18,r.top-5));
       }
     });
   };
   img.src=reader.result;
 };
 reader.readAsDataURL(f);
};
</script>
</body>
</html>
